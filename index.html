<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tooltips</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
        }

        .tooltip {
            position: relative;
            display: inline-block;

        }

        .tooltiptext {
            /* visibility: hidden; */
            /* display: none; */
            opacity: 0;
            width: 229px;
            background-color: black;
            color: #fff;
            border-radius: 6px;
            padding: 10px 0;
            position: absolute;
            bottom: 150%;
            left: 50%;
            margin-left: -50px;
            

        }

        .tooltiptext::before {
            content: "";
            position: absolute;
            top: 100%;
            left: 50%;
            margin-left: -5px;
            border-width: 9px;
            border-style: solid;
            border-color: black transparent transparent transparent;
        }

        .tooltip:hover .tooltiptext {
            opacity: 1;
            /* display: block; */
            /* visibility: visible; */
        }
    </style>
</head>

<body style="text-align:center;">
    <br><br><br><br><br><br><br><br><br><br>

    <div class="tooltip">Tooltips XD
        <span class="tooltiptext">Soy Josue </span>
    </div>
</body>

</html>
